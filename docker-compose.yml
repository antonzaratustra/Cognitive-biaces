services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cognitive_biases
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:1.89.2
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB_POSTGRESDB_DATABASE: cognitive_biases
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PASSWORD: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: postgres
      DB_TYPE: postgresdb
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-change-me}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemma-3-27b-it:free}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://example.ngrok-free.app/}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  site:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-cognitive_biases_atlas_bot}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    ports:
      - "3000:3000"

  ngrok-n8n:
    image: ngrok/ngrok:3
    restart: unless-stopped
    command: ["http", "http://n8n:5678"]
    depends_on:
      - n8n
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"

  ngrok-site:
    image: ngrok/ngrok:3
    restart: unless-stopped
    command: ["http", "http://site:3000"]
    depends_on:
      - site
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4041:4040"

volumes:
  n8n_data:
  postgres_data:
